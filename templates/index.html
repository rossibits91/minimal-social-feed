<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .post { border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: white; }
        .customize-btn { position: fixed; bottom: 20px; right: 20px; }
    </style>
</head>
<body class="{{ 'dark' if current_user.theme == 'dark' else 'light' }}">
    <nav class="navbar navbar-expand navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">Minimal Feed</a>
            <div>
                <a href="/" class="btn btn-outline-primary">Home</a>
                <a href="/logout" class="btn btn-outline-danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <!-- Post form -->
                <div class="card mb-4">
                    <div class="card-body">
                        <form method="POST" action="/post">
                            <textarea name="content" class="form-control" rows="3" placeholder="What's happening?"></textarea>
                            <button type="submit" class="btn btn-primary mt-2">Post</button>
                        </form>
                    </div>
                </div>

                <!-- Posts -->
                {% for post in posts %}
                <div class="post">
                    <strong>@{{ post.user.username if post.user else 'user' }}</strong>
                    <small class="text-muted">{{ post.timestamp.strftime('%Y-%m-%d %H:%M') }}</small>
                    <p>{{ post.content }}</p>
                    <a href="/like/{{ post.id }}" class="btn btn-sm btn-outline-danger">❤️ {{ post.likes|length }}</a>
                </div>
                {% endfor %}
            </div>

            <div class="col-md-4">
                <h5>Customize</h5>
                <p>Theme and layout options coming soon.</p>
            </div>
        </div>
    </div>
</body>
</html>
